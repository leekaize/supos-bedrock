version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: supos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-supos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - supos-bedrock
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.4.0
    container_name: supos-emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: supos
      EMQX_HOST: 127.0.0.1
      EMQX_NODE__COOKIE: supos_secret_cookie
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # MQTT/WebSocket
      - "18083:18083"  # Dashboard
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    networks:
      - supos-bedrock
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  supos-bedrock:
    external: true

volumes:
  postgres_data:
    name: supos_postgres_data
  emqx_data:
    name: supos_emqx_data
  emqx_log:
    name: supos_emqx_log